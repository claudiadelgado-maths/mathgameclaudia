<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Math Aventure</title>
  <link rel="stylesheet" href="games.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-top">
      <button class="home-btn" onclick="goHome()">←</button>
      <h1>Math Aventure</h1>
    </div>

    <p class="subtitle">
      Resuelve problemas de matemáticas.<br>
      Elige la rama que más deseas.
    </p>
  </header>

  <!-- CONTENEDOR DINÁMICO -->
  <main id="games-container" class="games-container">
    <!-- Las tarjetas se generan automáticamente -->
  </main>

  <!-- MODAL -->
  <div id="overlay" class="overlay">

    <div class="modal">

      <div class="modal-image" id="modal-image"></div>

      <div class="modal-content">
        <h2 id="modal-title"></h2>

        <p id="modal-description"></p>

        <div class="modal-actions">
          <button id="modal-go-btn">GO</button>
          <button onclick="closeModal()">Cerrar</button>
        </div>
      </div>

    </div>

  </div>

  <script src="games.js"></script>
</body>
</html>
