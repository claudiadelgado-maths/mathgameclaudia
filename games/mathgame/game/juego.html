<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Adventure</title>

<link rel="stylesheet" href="game.css?v=1">
<link rel="stylesheet" href="../modal/modal.css?v=1">

<!-- MathJax -->
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

</head>

<body>

<div id="game">

    <div class="header-box">

        <h1 id="game-title">Math Adventure</h1>

        <!-- Botones superiores -->
        <button id="inicio-btn" type="button">Inicio</button>
        <button id="niveles-btn" type="button">Niveles</button>

        <div id="info">
            <span id="nivel-info"></span>
            <span id="paso-info"></span>
        </div>

        <p id="instruccion">Elige la opción correcta</p>

        <div id="pregunta"></div>

    </div>

    <div id="opciones">
        <div class="opcion" id="opcionA"></div>
        <div class="opcion" id="opcionB"></div>
    </div>

    <div id="mensaje"></div>

    <button id="continuar-btn" type="button">
        Continuar
    </button>

</div>

<!-- Modal niveles -->

<div id="modal-niveles" class="modal oculto">

    <div class="modal-contenido">

        <span id="cerrar-modal">X</span>

        <div id="lista-niveles"></div>

    </div>

</div>

<!-- Scripts -->

<!-- efectos -->
<script src="../effects/sound.js?v=2"></script>
<script src="../effects/sprites.js?v=2"></script>

<!-- motor del juego -->
<script src="../engine/loader.js?v=2"></script>
<script src="../engine/engine.js?v=2"></script>

<!-- interfaz -->
<script src="../modal/modal.js?v=2"></script>
<script src="game.js?v=2"></script>
</body>

</html>
